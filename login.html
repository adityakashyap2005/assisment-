<style>
        .spatial-grid {
            background-image: 
                linear-gradient(rgba(149, 142, 160, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(149, 142, 160, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .volumetric-light {
            background: radial-gradient(circle at 50% 50%, rgba(109, 59, 215, 0.15) 0%, transparent 70%);
        }
        .glass-modal {
            backdrop-filter: blur(24px);
            background: rgba(30, 31, 37, 0.4);
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .edge-glow {
            position: relative;
        }
        .edge-glow::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.3) 0%, transparent 40%, rgba(76, 215, 246, 0.4) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .btn-3d {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 0 0 #5516be;
        }
        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 0 #5516be;
        }
        .input-inset {
            background: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen overflow-hidden selection:bg-primary/30">
<!-- Ambient Background Layer -->
<div class="fixed inset-0 z-0 spatial-grid"></div>
<div class="fixed inset-0 z-0 volumetric-light"></div>
<!-- TopAppBar Fragment (Execution of JSON keys) -->
<header class="w-full top-0 fixed backdrop-blur-xl bg-surface/30 flex items-center justify-center px-container-padding py-4 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-headline-lg" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<h1 class="font-display-lg text-display-lg tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">TASKFLOW</h1>
</div>
</header>
<!-- Main Spatial Canvas -->
<main class="relative z-10 flex min-h-screen items-center justify-center px-container-padding">
<!-- Large Floating 3D Frosted Glass Modal -->
<div class="glass-modal edge-glow w-full max-w-[480px] rounded-lg p-10 flex flex-col items-center gap-8 border border-white/5 relative overflow-hidden">
<!-- Branding Header inside Modal -->
<div class="text-center space-y-2">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Welcome Back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Access your secure project command center.</p>
</div>
<!-- Login Form Content -->
<form class="w-full space-y-6">
<!-- Username Input -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-primary px-1">USERNAME</label>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline text-[20px]">person</span>
</div>
<input class="w-full input-inset border-none rounded-DEFAULT py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-tertiary transition-all outline-none font-body-lg text-body-lg" placeholder="Enter your handle" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-label-caps text-primary">PASSWORD</label>
<a class="font-label-caps text-label-caps text-tertiary hover:opacity-80 transition-opacity" href="#">FORGOT?</a>
</div>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="w-full input-inset border-none rounded-DEFAULT py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-tertiary transition-all outline-none font-body-lg text-body-lg" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- 3D Primary Action Button -->
<button class="btn-3d w-full py-4 rounded-full bg-gradient-to-r from-primary-container to-secondary-container text-on-primary font-title-md text-title-md transition-transform active:scale-95 flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Bottom Link -->
<div class="pt-2">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-tertiary transition-colors flex items-center gap-2 group" href="#">
                    Don't have an account? 
                    <span class="text-secondary font-semibold group-hover:underline">Sign Up for TaskFlow</span>
</a>
</div>
<!-- Decorative 3D Elements (Glow Shadows) -->
<div class="absolute -bottom-24 -right-24 w-48 h-48 bg-tertiary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -top-24 -left-24 w-48 h-48 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
</div>
</main>
<!-- Visual Polish: Floating Background Blobs -->
<div class="fixed top-1/4 left-1/4 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] z-0 pointer-events-none"></div>
<div class="fixed bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[120px] z-0 pointer-events-none"></div>
